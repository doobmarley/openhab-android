name: Build App
on:
  push:
    branches-ignore:
      - l10n_main
      - dependabot/*
  pull_request:
    branches-ignore:
      - l10n_main
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        flavor: [FossStable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17
          cache: gradle
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4.3.1
      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle/
          echo -e "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
      - name: Build
        run: ./gradlew :mobile:assemble${{ matrix.flavor }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HomixCore-${{ matrix.flavor }}
          path: mobile/build/outputs/apk/**/*.apk
          retention-days: 30
